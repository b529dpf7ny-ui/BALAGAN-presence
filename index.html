// ── HELPERS ───────────────────────────────────────────────────────────────────
function dim(y,m){ return new Date(y,m+1,0).getDate(); }
function dname(y,m,d){ return DAYS[new Date(y,m,d).getDay()]; }
function isWE(y,m,d){ var w=new Date(y,m,d).getDay(); return w===0||w===6; }
function dk(e,d){ return yr+'-'+mo+'-'+e+'-'+d; }
function gv(e,d){ return data[dk(e,d)]||''; }
function cstyle(v){
  if(!v) return {bg:'transparent',fg:'#3A2015'};
  if(!isNaN(parseFloat(v))) return {bg:'#647A4E',fg:'#ECF0E8'};
  var c=CODES.find(function(x){return x.c===v;});
  return c ? {bg:c.bg,fg:c.fg} : {bg:'#1A0F0A',fg:'#6A5040'};
}
function calcS(e,y,m){
  var days=dim(y,m), ore=0,r=0,f=0,b=0,mal=0,p=0,c=0;
  for(var d=1;d<=days;d++){
    var v=data[y+'-'+m+'-'+e+'-'+d]||'';
    if(!v||v==='RR') continue;
    var n=parseFloat(v);
    if(!isNaN(n)) ore+=(n===1?8:n);
    else if(v==='R') r++;
    else if(v==='F') f+=8;
    else if(v==='B') b++;
    else if(v==='M') mal+=8;
    else if(v==='P') p+=8;
    else if(v==='C') c++;
  }
  return {ore:ore,r:r,f:f,b:b,mal:mal,p:p,c:c};
}
function calcA(e,y){
  var t={ore:0,f:0,b:0,mal:0};
  for(var m=0;m<12;m++){var s=calcS(e,y,m);t.ore+=s.ore;t.f+=s.f;t.b+=s.b;t.mal+=s.mal;}
  return t;
}

    {l:'Ferie',      v:Math.round(tots.reduce(function(a,t){return a+t.f;},0)/8)+'gg', col:'#4E6B7A'},
    {l:'Trasferte',  v:tots.reduce(function(a,t){return a+t.b;},0)+'gg',      col:'#A86B35'},
    {l:'Malattia',   v:Math.round(tots.reduce(function(a,t){return a+t.mal;},0)/8)+'gg',col:'#9A3520'}
  ];
  var kg='';
  kpis.forEach(function(k){ kg+='<div class="kc"><div class="kl">'+k.l+'</div><div class="kv" style="color:'+k.col+'">'+k.v+'</div></div>'; });
  document.getElementById('kg').innerHTML=kg;

  var mx=Math.max.apply(null,tots.map(function(t){return t.ore;}).concat([1]));
  var abar='<div style="font-weight:200;font-size:7px;color:#6A5040;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;">Ore per Dipendente &#183; '+aYr+'</div><div class="bc">';
  tots.forEach(function(t){
    abar+='<div class="bw"><div style="flex:1;display:flex;align-items:flex-end;width:100%;justify-content:center;">'
      +'<div class="bar" style="height:'+Math.max(2,t.ore/mx*100)+'%;"></div></div>'
      +'<div class="bv">'+t.ore+'</div><div class="bl">'+t.short+'</div></div>';
  });
  abar+='</div>';
  document.getElementById('abar').innerHTML=abar;

  var th='<thead><tr><th>Dipendente</th>';
  MS.forEach(function(m){ th+='<th>'+m+'</th>'; });
  th+='<th>TOT</th></tr></thead>';
  var tb='<tbody>';
  tots.forEach(function(t,i){
    tb+='<tr style="background:'+(i%2===0?'#1A0F0A':'transparent')+'"><td>'+t.e+'</td>';
    MS.forEach(function(_,mi){
      var o=calcS(t.e,aYr,mi).ore;
      tb+='<td style="color:'+(o>0?'#C98A4A':'#3A2015')+'">'+(o||'&#8212;')+'</td>';
    });
    tb+='<td style="color:#EEE6DC;font-size:12px;">'+t.ore+'h</td></tr>';
  });
  tb+='<tr class="ft"><td>TOTALE</td>';
  MS.forEach(function(_,mi){
    var s=emp.reduce(function(a,e){return a+calcS(e,aYr,mi).ore;},0);
    tb+='<td>'+(s||'&#8212;')+'</td>';
  });
  tb+='<td style="color:#C98A4A;font-size:13px;">'+tOre+'h</td></tr></tbody>';
  document.getElementById('atr').innerHTML=th+tb;
}

// ── TEAM ──────────────────────────────────────────────────────────────────────
function rTeam(){
  var cY=new Date().getFullYear();
  var list='';
  emp.forEach(function(e,i){
    var ore=calcA(e,cY).ore;
    var esc=e.replace(/\\/g,'\\\\').replace(/'/g,'\\\'');
    list+='<div class="ti" style="background:'+(i%2===0?'#1A0F0A':'transparent')+'">'
      +'<div class="tav">'+e[0]+'</div>'
      +'<div style="flex:1;min-width:0;"><div class="tnm">'+e+'</div>'
      +'<div class="tsb">#'+('0'+(i+1)).slice(-2)+' &#183; '+ore+'h quest\'anno</div></div>'
      +'<button class="trm" onclick="askRm(\''+esc+'\')">rm</button></div>';
  });
  document.getElementById('vTeam').innerHTML=
    '<div style="font-weight:100;font-size:20px;letter-spacing:4px;margin-bottom:14px;">'+emp.length+' Dipendenti</div>'
    +'<div style="height:1px;background:#32190E;margin-bottom:14px;"></div>'
    +'<div class="tl"><div style="max-height:55vh;overflow-y:auto;">'+list+'</div>'
    +'<div class="tadd"><input type="text" id="nemp" placeholder="COGNOME NOME..." onkeydown="if(event.key===\'Enter\')addE()"/>'
    +'<button class="tabtn" onclick="addE()">+ ADD</button></div></div>';
}

function addE(){
  var inp=document.getElementById('nemp');
  var n=inp.value.trim().toUpperCase();
  if(!n||emp.indexOf(n)>=0) return;
  emp.push(n); inp.value=''; save(); rTeam(); showToast(n+' aggiunto');
}
function askRm(e){ rmE=e; document.getElementById('cfnm').textContent=e; document.getElementById('cfmod').style.display='flex'; }
function cCf(){ document.getElementById('cfmod').style.display='none'; rmE=null; }
function doRm(){
  if(!rmE) return;
  emp=emp.filter(function(x){return x!==rmE;});
  Object.keys(data).forEach(function(k){if(k.indexOf('-'+rmE+'-')>=0) delete data[k];});
  save(); cCf(); rTeam(); showToast('Rimosso');
}

// ── CELL MODAL ────────────────────────────────────────────────────────────────
function oMod(e,d){
  eEmp=e; eDay=d;
  document.getElementById('memp').textContent=e;
  document.getElementById('mdat').textContent=dname(yr,mo,d)+', '+d+' '+MONTHS[mo]+' '+yr;
  var cur=gv(e,d);
  var hb='';
  [1,2,3,4,5,6,7,8].forEach(function(n){
    hb+='<button class="hb'+(cur==n?' hba':'')+'" onclick="setC(\''+n+'\')">'+n+'</button>';
  });
  document.getElementById('hbs').innerHTML=hb;
  var tg='';
  CODES.filter(function(c){return c.c!=='1';}).forEach(function(c){
    var active=cur===c.c;
    var style=active?'background:'+c.bg+';color:'+c.fg+';border-color:'+c.bg:'';
    tg+='<button class="tb" style="'+style+'" onclick="setC(\''+c.c+'\')">'+c.c+' &#183; '+c.l+'</button>';
  });
  document.getElementById('tgr').innerHTML=tg;
  document.getElementById('cmod').style.display='flex';
}
function cMo(){ document.getElementById('cmod').style.display='none'; eEmp=null; eDay=null; }
function setC(v){
  if(!eEmp) return;
  data[dk(eEmp,eDay)]=v.toUpperCase(); save(); cMo(); rCal();
}
function clC(){
  if(!eEmp) return;
  delete data[dk(eEmp,eDay)]; save(); cMo(); rCal();
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function loadXLSX(cb){
  if(xlsxLoaded){cb();return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload=function(){xlsxLoaded=true;cb();};
  s.onerror=function(){alert('Errore caricamento libreria Excel. Controlla la connessione.');};
  document.head.appendChild(s);
}
function expM(){ loadXLSX(doExpM); }
function doExpM(){
  var days=dim(yr,mo);
  var hdr=['Dipendente'];
  for(var d=1;d<=days;d++) hdr.push(d+' '+dname(yr,mo,d));
  hdr=hdr.concat(['Ore','R','F(h)','B','M(h)','P(h)','C']);
  var rows=emp.map(function(e){
    var s=calcS(e,yr,mo);
    var row=[e];
    for(var d=1;d<=days;d++) row.push(data[yr+'-'+mo+'-'+e+'-'+d]||'');
    return row.concat([s.ore,s.r,s.f,s.b,s.mal,s.p,s.c]);
  });
  var wb=XLSX.utils.book_new();
  var ws=XLSX.utils.aoa_to_sheet([hdr].concat(rows));
  var cols=[{wch:22}];
  for(var i=0;i<days;i++) cols.push({wch:4});
  for(var i=0;i<7;i++) cols.push({wch:8});
  ws['!cols']=cols;
  XLSX.utils.book_append_sheet(wb,ws,MONTHS[mo]+' '+yr);
  XLSX.writeFile(wb,'Balagan_'+MONTHS[mo]+'_'+yr+'.xlsx');
  showToast('Esportato: '+MONTHS[mo]+' '+yr);
}
function expAnn(){ loadXLSX(doExpAnn); }
function doExpAnn(){
  var wb=XLSX.utils.book_new();
  for(var m=0;m<12;m++){
    var d2=dim(aYr,m);
    var hdr=['Dipendente'];
    for(var d=1;d<=d2;d++) hdr.push(String(d));
    hdr=hdr.concat(['Ore','F(h)','B','M(h)']);
    var rows=emp.map(function(e){
      var s=calcS(e,aYr,m);
      var row=[e];
      for(var d=1;d<=d2;d++) row.push(data[aYr+'-'+m+'-'+e+'-'+d]||'');
      return row.concat([s.ore,s.f,s.b,s.mal]);
    });
    var ws=XLSX.utils.aoa_to_sheet([hdr].concat(rows));
    var cols=[{wch:20}];
    for(var d=0;d<d2;d++) cols.push({wch:3});
    for(var d=0;d<4;d++) cols.push({wch:8});
    ws['!cols']=cols;
    XLSX.utils.book_append_sheet(wb,ws,MS[m]);
  }
  XLSX.writeFile(wb,'Balagan_Annuale_'+aYr+'.xlsx');
  showToast('Export '+aYr+' completato');
}

// ── INIT (after first paint) ──────────────────────────────────────────────────
function init(){
  // Set assets
  var uri=DRAG;
  document.getElementById('simg').src=uri;
  document.getElementById('lg').src=uri;
  document.getElementById('lg').style.cssText='width:19px;height:23px;filter:sepia(1) saturate(.5) brightness(.75) opacity(.8)';

  // Try localStorage, fall back to bundled data
  var storedEmp=null, storedData=null;
  try{var se=localStorage.getItem(EK); if(se) storedEmp=JSON.parse(se);}catch(e){}
  try{var sd=localStorage.getItem(DK); if(sd) storedData=JSON.parse(sd);}catch(e){}

  emp = storedEmp || EMPS;

  if(storedData){
    data = storedData;
  } else {
    // Expand compact keys: "Y-M-INDEX-D" -> "Y-M-EMPNAME-D"
    var expanded={};
    Object.keys(CDATA).forEach(function(k){
      var parts=k.split('-');
      var y=parts[0], m=parts[1], idx=parseInt(parts[2]), d=parts[3];
      var ename=EMPS[idx];
      if(ename) expanded[y+'-'+m+'-'+ename+'-'+d]=CDATA[k];
    });
    data=expanded;
  }

  renderLegend();
  sv('Cal');

  // Show app, fade splash
  document.getElementById('app').style.visibility='visible';
  var splash=document.getElementById('splash');
  splash.classList.add('done');
  setTimeout(function(){splash.style.display='none';},350);
}

// Run init after browser paints the splash
requestAnimationFrame(function(){ setTimeout(init, 0); });
</script>
